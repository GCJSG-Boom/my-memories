<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"></head>
<body style="font-family:sans-serif;text-align:center;margin-top:60px;">
  <p id="msg">认证中...</p>
  <script>
    (function() {
      // 从 cookie 中读取 GitHub token
      function getCookie(name) {
        var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? match[2] : null;
      }

      var token = getCookie('github_token');
      var msg = document.getElementById('msg');

      if (!token) {
        msg.innerHTML = '<h2>尚未设置 GitHub Token</h2><p>请先访问 <a href="/admin/setup.html">设置页面</a></p><p style="color:#888;">只需设置一次，之后就能直接使用</p>';
        return;
      }

      var sent = false;
      function sendToken() {
        if (sent) return;
        sent = true;
        // 将 token 发送给 Decap CMS
        window.opener.postMessage(
          { token: token, provider: 'github', backendName: 'github' },
          window.opener.location.origin
        );
        msg.textContent = '认证成功 ✅ 正在跳转...';
        setTimeout(function() { window.close(); }, 500);
      }

      // 方案1：等待 CMS 发送握手消息
      window.addEventListener('message', function(e) { sendToken(); });

      // 方案2：800ms 后自动发送（兜底）
      setTimeout(sendToken, 800);
    })();
  </script>
</body>
</html>
