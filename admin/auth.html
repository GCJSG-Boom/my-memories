<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"></head>
<body style="font-family:sans-serif;text-align:center;margin-top:60px;">
  <p id="msg">认证中...</p>
  <script>
    (function() {
      function getCookie(name) {
        var match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? match[2] : null;
      }

      var token = getCookie('github_token');
      var msg = document.getElementById('msg');

      if (!token) {
        msg.innerHTML = '<h2>尚未设置 Token</h2><p>请先访问 <a href="/admin/setup.html">/admin/setup.html</a> 进行设置</p><p style="color:#888;">只需设置一次</p>';
        return;
      }

      var sent = false;
      function sendToken() {
        if (sent) return;
        sent = true;
        // ⚠️ 必须用 JSON.stringify，Decap CMS 会用 JSON.parse 解析
        var data = JSON.stringify({ token: token, provider: 'github' });
        window.opener.postMessage(data, window.opener.location.origin);
        msg.textContent = '认证成功！正在跳转...';
        setTimeout(function() { window.close(); }, 500);
      }

      // 监听 CMS 握手消息（如果 CMS 发送的话）
      window.addEventListener('message', function() { sendToken(); });

      // 兜底：等待 800ms 让 CMS 准备好监听器
      setTimeout(sendToken, 800);
    })();
  </script>
</body>
</html>
